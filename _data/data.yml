career-profile:
  title:
    zh: 个人简介
    en: Profile
  summary:
    zh: |
      我是一名从**进化人类学**视角开展**计算社会科学**研究的学者，现任**长沙中南大学社会学系讲师**，并兼任**伦敦大学学院荣誉研究员**。我的研究主要关注家庭与社会群体中的合作与竞争机制，以及文化模式如何在特定生态背景中适应并促进合作行为。

      在方法上，我结合**经济博弈实验**、**数学建模**、**社会网络分析**与**人口数据分析**展开研究，主要使用 R 进行实证分析，也熟悉贝叶斯建模等定量方法。我希望通过跨学科研究进一步理解社会合作的演化过程，并为文化适应与社会行为塑造机制提供新的解释框架。
    en: |
      I am an academic working on **computational social science** from an **evolutionary anthropology** perspective. I currently serve as a **Lecturer in the Department of Sociology at Central South University** and as an **Honorary Research Fellow at University College London**. My research focuses on the evolutionary mechanisms of cooperation and competition within families and social groups, and on how cultural patterns adapt to ecological contexts to promote cooperative behaviour.

      Methodologically, I combine **economic game experiments**, **mathematical modelling**, **social network analysis**, and **empirical demographic data analysis**, primarily using R. I also have experience with Bayesian modelling and related quantitative approaches. Through interdisciplinary research, I aim to deepen our understanding of the evolutionary processes underlying social cooperation and the mechanisms shaping human social behaviour.

education:
  title:
    zh: 教育经历
    en: Education
  info:
    - degree:
        zh: 荣誉研究员
        en: Honorary Research Fellow
      university:
        zh: 英国伦敦大学学院
        en: University College London, UK
      time: 2025.03 - 2026.03
      details:
        zh: |
          在 UCL 继续开展人类行为生态学与计算社会科学相关研究，维持国际合作与学术交流。
        en: |
          Continuing research in human behavioural ecology and computational social science at UCL while maintaining international collaborations.
    - degree:
        zh: 人类生物学与进化学博士
        en: PhD in Human Biology and Evolution
      university:
        zh: 英国伦敦大学学院
        en: University College London, UK
      time: 2020.09 - 2025.02
      details:
        zh: |
          导师：**Ruth Mace（FBA）** 与 **Mark Dyble**。论文题目：**The Behavioural Ecology of Costly Religious Practices**。研究围绕合作演化、宗教行为、社会网络与人口数据建模展开，并以第一作者身份发表多篇 SCI 论文。
        en: |
          Supervisors: **Prof. Ruth Mace (FBA)** and **Dr. Mark Dyble**. Thesis title: **The Behavioural Ecology of Costly Religious Practices**. My doctoral research focused on cooperation, religion, social networks, and demographic modelling, and resulted in multiple SCI publications as lead author.
    - degree:
        zh: 人类行为生态学硕士
        en: Master's Degree in Human Behavioural Ecology
      university:
        zh: 中国兰州大学
        en: Lanzhou University, China
      time: 2017.09 - 2020.06
      details:
        zh: |
          导师：**Ruth Mace（FBA）** 与 **杜娟**。论文题目：**Evolutionary Mechanism of Costly Behaviour in the Eastern Qinghai-Tibet Plateau**。研究聚焦高原地区高代价行为的演化机制，并以第一作者发表 SCI 论文。
        en: |
          Supervisors: **Prof. Ruth Mace (FBA)** and **Prof. Juan Du**. Dissertation title: **Evolutionary Mechanism of Costly Behaviour in the Eastern Qinghai-Tibet Plateau**. My master's research examined costly behaviour in plateau populations and led to an SCI publication as first author.
    - degree:
        zh: 生物技术学士
        en: Bachelor's Degree in Biotechnology
      university:
        zh: 中国兰州大学
        en: Lanzhou University, China
      time: 2013.09 - 2017.06
      details:
        zh: |
          本科阶段系统学习生物学基础理论与实验技能，为后续跨学科研究奠定基础。
        en: |
          During my undergraduate study, I received systematic training in biology and laboratory methods, which later supported my interdisciplinary research trajectory.

